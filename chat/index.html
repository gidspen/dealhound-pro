<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Up Your Buy Box — Deal Hound</title>
  <meta name="description" content="Tell your AI deal hunting agent exactly what you're looking for. 5 minutes to set up, then your agent hunts for you." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F8F5EF;
      --surface:   #FFFFFF;
      --surface2:  #F0EDE4;
      --border:    rgba(0,0,0,0.08);
      --cream:     #1D1D1B;
      --cream-dim: rgba(29,29,27,0.62);
      --cream-sub: rgba(29,29,27,0.38);
      --gold:      #243D35;
      --gold-dim:  rgba(36,61,53,0.10);
      --gold-glow: rgba(36,61,53,0.04);
      --green:     #1a7f37;
      --green-dim: rgba(26,127,55,0.08);
      --amber:     #b45309;
      --sans:      'Outfit', system-ui, sans-serif;
      --serif:     'Cormorant Garamond', Georgia, serif;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 700px; height: 700px; top: -250px; left: -200px; background: radial-gradient(circle, rgba(36,61,53,0.07) 0%, transparent 70%); }
    .orb-2 { width: 500px; height: 500px; top: 40%; right: -150px; background: radial-gradient(circle, rgba(26,127,55,0.04) 0%, transparent 70%); }

    /* ── NAV ─────────────────────────────────────── */
    nav {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(248,245,239,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      flex-shrink: 0;
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--cream);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-logo-icon {
      width: 26px; height: 26px;
      background: var(--gold);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .nav-step {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream-sub);
    }

    /* ── EMAIL GATE ──────────────────────────────── */
    .email-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 40px 32px;
      z-index: 1;
      position: relative;
    }
    .email-gate h1 {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 12px;
      text-align: center;
    }
    .email-gate h1 em { font-style: italic; color: var(--gold); }
    .email-gate p {
      font-size: 0.92rem;
      color: var(--cream-dim);
      margin-bottom: 32px;
      text-align: center;
      max-width: 420px;
    }
    .email-form {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }
    .email-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 14px 18px;
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }
    .email-form input::placeholder { color: var(--cream-sub); }
    .email-form input:focus { border-color: var(--gold); }
    .btn-primary {
      background: var(--gold);
      color: #FFFFFF;
      border: none;
      padding: 14px 24px;
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .email-note {
      margin-top: 16px;
      font-size: 0.78rem;
      color: var(--cream-sub);
    }
    .email-note strong { color: var(--cream-dim); font-weight: 500; }

    /* ── CHAT CONTAINER ──────────────────────────── */
    .chat-container {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      z-index: 1;
      position: relative;
    }
    .chat-container.active {
      display: flex;
    }

    /* ── MESSAGES ─────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 32px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      max-width: 85%;
      line-height: 1.65;
      font-size: 0.9rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-assistant {
      align-self: flex-start;
      color: var(--cream);
    }
    .msg-assistant .msg-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg-assistant .msg-label .dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
    }
    .msg-user {
      align-self: flex-end;
      background: var(--gold);
      color: #FFFFFF;
      padding: 12px 18px;
      border-radius: 16px 16px 4px 16px;
      font-weight: 400;
    }
    .msg-assistant .msg-body {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 20px;
      border-radius: 4px 16px 16px 16px;
    }

    /* Buy box confirmation card */
    .buybox-confirmed {
      background: var(--gold-glow);
      border: 1px solid rgba(36,61,53,0.2);
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 12px;
      animation: fadeIn 0.3s ease;
    }
    .buybox-confirmed .label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .buybox-confirmed .cta {
      display: inline-block;
      margin-top: 16px;
      background: var(--gold);
      color: #FFFFFF;
      padding: 12px 28px;
      border-radius: 4px;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .buybox-confirmed .cta:hover { opacity: 0.88; }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }
    .typing span {
      width: 6px; height: 6px;
      background: var(--cream-sub);
      border-radius: 50%;
      animation: typingDot 1.4s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* ── INPUT BAR ────────────────────────────────── */
    .input-bar {
      padding: 16px 32px 24px;
      border-top: 1px solid var(--border);
      background: rgba(248,245,239,0.95);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .input-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }
    .input-inner input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 14px 18px;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-inner input::placeholder { color: var(--cream-sub); }
    .input-inner input:focus { border-color: var(--gold); }
    .btn-send {
      background: var(--gold);
      color: #FFFFFF;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-send:hover { opacity: 0.88; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-send svg { width: 16px; height: 16px; }

    /* ── RESPONSIVE ───────────────────────────────── */
    @media (max-width: 768px) {
      nav { padding: 12px 16px; }
      .messages { padding: 20px 16px 12px; }
      .input-bar { padding: 12px 16px 20px; }
      .email-gate { padding: 40px 20px; }
      .email-form { flex-direction: column; }
      .msg { max-width: 92%; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav>
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon"><svg width="13" height="13" viewBox="0 0 16 16" fill="white"><path d="M8 0 L9.6 6.4 L16 8 L9.6 9.6 L8 16 L6.4 9.6 L0 8 L6.4 6.4 Z"/></svg></div>
      Deal Hound
    </a>
    <span class="nav-step" id="nav-step">Step 1 — Set Up Your Buy Box</span>
  </nav>

  <!-- EMAIL GATE -->
  <div class="email-gate" id="email-gate">
    <h1>Tell your agent<br>what to <em>hunt.</em></h1>
    <p>Enter your email and your AI agent will ask a few questions to learn your exact buy box. Any asset class. Takes about 2 minutes.</p>
    <form class="email-form" id="email-form">
      <input type="email" id="email-input" placeholder="your@email.com" required autocomplete="email" autofocus />
      <button type="submit" class="btn-primary">Start</button>
    </form>
    <p class="email-note"><strong>First scan is free.</strong> No credit card required.</p>
  </div>

  <!-- CHAT -->
  <div class="chat-container" id="chat-container">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <div class="input-inner">
        <input type="text" id="chat-input" placeholder="Type your answer..." autocomplete="off" />
        <button class="btn-send" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api/chat';
    let userEmail = '';
    let conversationId = null;
    let chatHistory = []; // {role, content} pairs for Claude
    let isStreaming = false;
    let searchId = null;

    // Email form
    document.getElementById('email-form').addEventListener('submit', (e) => {
      e.preventDefault();
      userEmail = document.getElementById('email-input').value.trim();
      if (!userEmail) return;

      document.getElementById('email-gate').style.display = 'none';
      document.getElementById('chat-container').classList.add('active');

      // Kick off the conversation — send empty user message to get Claude's intro
      startConversation();
    });

    // Chat input — enter to send
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function startConversation() {
      // Add a temporary "thinking" indicator
      showTyping();

      // Send initial message to get Claude's greeting
      chatHistory = [{ role: 'user', content: 'Hi, I want to set up my buy box.' }];

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: userEmail,
            messages: chatHistory,
            conversation_id: conversationId
          })
        });

        hideTyping();
        await handleStream(response);
      } catch (err) {
        hideTyping();
        addMessage('assistant', 'Something went wrong connecting to your agent. Please refresh and try again.');
      }
    }

    async function sendMessage() {
      if (isStreaming) return;

      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      addMessage('user', text);

      chatHistory.push({ role: 'user', content: text });

      showTyping();
      isStreaming = true;
      document.getElementById('send-btn').disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: userEmail,
            messages: chatHistory,
            conversation_id: conversationId
          })
        });

        hideTyping();
        await handleStream(response);
      } catch (err) {
        hideTyping();
        addMessage('assistant', 'Connection lost. Please try again.');
      }

      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('chat-input').focus();
    }

    async function handleStream(response) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let assistantText = '';
      let msgEl = null;
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // Keep incomplete line in buffer

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const json = line.slice(6);
          if (!json) continue;

          try {
            const event = JSON.parse(json);

            if (event.type === 'text') {
              if (!msgEl) {
                msgEl = addMessage('assistant', '');
              }
              assistantText += event.text;
              msgEl.querySelector('.msg-body').textContent = assistantText;
              scrollToBottom();
            } else if (event.type === 'conversation_id') {
              conversationId = event.id;
            } else if (event.type === 'buy_box_saved') {
              searchId = event.search_id;
              showBuyBoxConfirmed(event.buy_box, event.search_id);
            } else if (event.type === 'error') {
              addMessage('assistant', 'Error: ' + event.error);
            }
          } catch (e) {
            // Skip malformed JSON
          }
        }
      }

      if (assistantText) {
        chatHistory.push({ role: 'assistant', content: assistantText });
      }
    }

    function addMessage(role, text) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg msg-${role}`;

      if (role === 'assistant') {
        div.innerHTML = `
          <div class="msg-label"><span class="dot"></span> Deal Hound</div>
          <div class="msg-body">${escapeHtml(text)}</div>
        `;
      } else {
        div.textContent = text;
      }

      messages.appendChild(div);
      scrollToBottom();
      return div;
    }

    function showBuyBoxConfirmed(buyBox, searchId) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'buybox-confirmed';

      const summary = [];
      if (buyBox.locations) summary.push(`Markets: ${buyBox.locations.join(', ')}`);
      if (buyBox.price_min || buyBox.price_max) {
        const min = buyBox.price_min ? `$${(buyBox.price_min/1000).toFixed(0)}k` : 'No min';
        const max = buyBox.price_max ? `$${(buyBox.price_max/1000000).toFixed(1)}M` : 'No max';
        summary.push(`Price: ${min} – ${max}`);
      }
      if (buyBox.property_types) summary.push(`Types: ${buyBox.property_types.join(', ')}`);
      if (buyBox.revenue_requirement) summary.push(`Revenue: ${buyBox.revenue_requirement.replace(/_/g, ' ')}`);
      if (buyBox.acreage_min) summary.push(`Min acreage: ${buyBox.acreage_min}`);
      if (buyBox.exclusions && buyBox.exclusions.length) summary.push(`Exclusions: ${buyBox.exclusions.join(', ')}`);

      div.innerHTML = `
        <div class="label">Buy Box Saved</div>
        <div style="font-size:0.85rem; color:var(--cream-dim); line-height:1.7;">
          ${summary.join('<br>')}
        </div>
        <a href="/scan/?id=${searchId}" class="cta">Run My First Scan →</a>
      `;

      messages.appendChild(div);

      // Update nav
      document.getElementById('nav-step').textContent = 'Buy Box Ready';

      // Hide input bar
      document.querySelector('.input-bar').style.display = 'none';

      scrollToBottom();
    }

    function showTyping() {
      const messages = document.getElementById('messages');
      let typing = document.getElementById('typing-indicator');
      if (typing) return;

      typing = document.createElement('div');
      typing.id = 'typing-indicator';
      typing.className = 'msg msg-assistant';
      typing.innerHTML = `
        <div class="msg-label"><span class="dot"></span> Deal Hound</div>
        <div class="typing"><span></span><span></span><span></span></div>
      `;
      messages.appendChild(typing);
      scrollToBottom();
    }

    function hideTyping() {
      const typing = document.getElementById('typing-indicator');
      if (typing) typing.remove();
    }

    function scrollToBottom() {
      const messages = document.getElementById('messages');
      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
