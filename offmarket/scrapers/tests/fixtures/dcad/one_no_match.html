<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Dallas Central Appraisal District - Property Search Results</title>
</head>
<body>
<form name="aspnetForm" method="post" action="SearchOwner.aspx" id="aspnetForm">
<input type="hidden" name="__VIEWSTATE" id="__VIEWSTATE" value="FAKE_VIEWSTATE_FOR_FIXTURE" />
<input type="hidden" name="__EVENTVALIDATION" id="__EVENTVALIDATION" value="FAKE_VALIDATION" />

<!-- Navigation table — should NOT be picked up by _parse_results -->
<table id="tblNavigation" cellpadding="2" cellspacing="0">
  <tr>
    <td><a href="/">Home</a></td>
    <td><a href="/SearchOwner.aspx">Owner Search</a></td>
  </tr>
</table>

<!-- No results message — the grid is absent entirely on a true no-match page -->
<p id="lblNoResults" style="color:red; font-weight:bold;">
  No records found matching your search criteria. Please refine your search and try again.
</p>

<p>
  Tips: Try searching by last name only. Partial names are accepted.
  For business owners, try the business name.
</p>

</form>
</body>
</html>
